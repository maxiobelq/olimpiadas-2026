<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olimpiadas del Parque 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-green-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Iconos SVG inline (Lucide style)
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calendar: <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />,
                mapPin: <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0zM12 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />,
                clock: <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />,
                gift: <rect x="3" y="8" width="18" height="4" /><path d="M12 8v14M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5" />,
                pizza: <path d="M15 11h.01M11 15h.01M10 10h.01M2 16a20 20 0 0 0 18-12A20 20 0 0 0 2 16zM11 5l9 7" />,
                leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-10 10zM11 20a11.3 11.3 0 0 0-8-12M11 13a4 4 0 0 0-4-4" />,
                trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z" />,
                send: <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />,
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />,
                help: <circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01" />,
                search: <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />,
                alert: <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('invite');

            return (
                <div className="min-h-screen bg-green-50 text-slate-900 p-4 md:p-8">
                    <div className="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-2xl overflow-hidden border-8 border-green-100/50">
                        
                        {/* Header */}
                        <div className="bg-emerald-600 p-8 text-white text-center relative overflow-hidden">
                            <Icon name="leaf" size={80} className="absolute top-0 left-0 p-4 opacity-20 rotate-45" />
                            <Icon name="leaf" size={100} className="absolute bottom-0 right-0 p-4 opacity-20 -rotate-12" />
                            <h1 className="text-4xl md:text-5xl font-black tracking-tight mb-1 uppercase">
                                OLIMPIADAS <span className="text-yellow-300 italic">2026</span>
                            </h1>
                            <div className="inline-block bg-white/20 backdrop-blur-sm px-6 py-1 rounded-full text-xs font-bold tracking-[0.2em] uppercase border border-white/30">
                                JARDÍN BOTÁNICO
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="flex bg-white border-b border-green-100">
                            <button onClick={() => setActiveTab('invite')} className={`flex-1 py-4 font-bold text-xs transition-all ${activeTab === 'invite' ? 'text-emerald-600 border-b-4 border-emerald-500 bg-emerald-50/50' : 'text-slate-400'}`}>LA CITA</button>
                            <button onClick={() => setActiveTab('games')} className={`flex-1 py-4 font-bold text-xs transition-all ${activeTab === 'games' ? 'text-emerald-600 border-b-4 border-emerald-500 bg-emerald-50/50' : 'text-slate-400'}`}>LOS RETOS</button>
                        </div>

                        {/* Content Area */}
                        <div className="p-6 md:p-10">
                            {activeTab === 'invite' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-emerald-50 p-6 rounded-[2rem] border-2 border-emerald-100 flex items-center gap-4 shadow-sm">
                                            <div className="bg-emerald-500 p-3 rounded-2xl text-white"><Icon name="calendar" size={24} /></div>
                                            <div>
                                                <p className="text-[10px] uppercase font-bold text-emerald-400">Fecha</p>
                                                <p className="font-bold text-slate-800 text-sm">28 de Feb</p>
                                            </div>
                                        </div>
                                        <div className="bg-sky-50 p-6 rounded-[2rem] border-2 border-sky-100 flex items-center gap-4 shadow-sm">
                                            <div className="bg-sky-500 p-3 rounded-2xl text-white"><Icon name="mapPin" size={24} /></div>
                                            <div>
                                                <p className="text-[10px] uppercase font-bold text-sky-400">Lugar</p>
                                                <p className="font-bold text-slate-800 text-sm">J. Botánico</p>
                                            </div>
                                        </div>
                                        <div className="bg-amber-50 p-6 rounded-[2rem] border-2 border-amber-100 flex items-center gap-4 shadow-sm">
                                            <div className="bg-amber-500 p-3 rounded-2xl text-white"><Icon name="clock" size={24} /></div>
                                            <div>
                                                <p className="text-[10px] uppercase font-bold text-amber-400">Hora</p>
                                                <p className="font-bold text-slate-800 text-sm">11:00 AM</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-orange-500 p-8 rounded-[2.5rem] text-white relative overflow-hidden shadow-xl shadow-orange-100 border-4 border-orange-400 text-center md:text-left">
                                        <div className="relative z-10 flex flex-col md:flex-row gap-6 items-center">
                                            <div className="bg-white/20 p-4 rounded-3xl backdrop-blur-md"><Icon name="gift" size={48} className="text-white drop-shadow-md" /></div>
                                            <div>
                                                <h3 className="text-2xl font-black mb-1 italic tracking-tight uppercase">La Caja de Tesoros</h3>
                                                <p className="text-orange-50 text-sm leading-relaxed font-medium">
                                                    Trae un <strong>chéchere</strong> pequeño (bolígrafo cool, stickers, llavero). ¡El equipo ganador se lleva el botín de todos! 🎁
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-lime-50 p-6 rounded-3xl border-2 border-lime-100 flex flex-col md:flex-row gap-4 items-center">
                                        <div className="bg-lime-500 p-3 rounded-2xl text-white"><Icon name="pizza" size={24} /></div>
                                        <div className="flex-1 text-center md:text-left">
                                            <h4 className="font-bold text-lime-900 text-sm italic uppercase tracking-tighter">Picnic Compartido</h4>
                                            <p className="text-lime-800 text-xs font-semibold">Cada uno lleva algo de picar o beber para el cierre triunfal.</p>
                                        </div>
                                    </div>

                                    <div className="text-center pt-4">
                                        <button className="bg-emerald-600 hover:bg-emerald-700 text-white px-16 py-5 rounded-full font-black shadow-lg shadow-emerald-100 transition-all hover:scale-105 active:scale-95 uppercase tracking-tighter text-xl">
                                            Confirmar asistencia
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'games' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {[
                                            { title: 'Aviones de Papel', desc: 'Física y nostalgia en el césped.', icon: "send", color: "text-sky-500" },
                                            { title: 'Torre de Vasos', desc: 'Arquitectura frágil vs la brisa.', icon: "sparkles", color: "text-amber-500" },
                                            { title: 'Trivia Social', desc: 'Descubriendo secretos de amigos.', icon: "help", color: "text-rose-500" },
                                            { title: 'Búsqueda Inversa', desc: '¡El primero que saque el objeto gana!', icon: "search", color: "text-emerald-500" },
                                        ].map((game, i) => (
                                            <div key={i} className="p-6 border-2 border-slate-50 rounded-[2.5rem] hover:bg-emerald-50 transition-colors bg-white shadow-sm flex flex-col items-center text-center group">
                                                <div className="mb-4 bg-emerald-50 w-12 h-12 rounded-2xl flex items-center justify-center group-hover:bg-white transition-colors">
                                                    <Icon name={game.icon} className={game.color} />
                                                </div>
                                                <h4 className="font-black text-lg mb-1 group-hover:text-emerald-600 transition-colors uppercase italic tracking-tighter">{game.title}</h4>
                                                <p className="text-slate-500 text-sm leading-tight font-medium">{game.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="p-6 bg-slate-900 rounded-[2rem] text-white flex gap-4 items-start border-4 border-slate-800">
                                        <Icon name="alert" size={24} className="text-yellow-400 shrink-0" />
                                        <div>
                                            <h4 className="font-bold text-xs uppercase tracking-widest text-emerald-400">Ley del Mesonero</h4>
                                            <p className="text-slate-400 text-xs">Cualquier trampa será castigada con servicio de mesa obligatorio durante el picnic final.</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="bg-emerald-50 p-6 text-center border-t border-green-100">
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">
                                28 de febrero • Jardín Botánico • 2026
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
